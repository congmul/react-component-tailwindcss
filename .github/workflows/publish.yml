name: Publish package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main (if this is a tag-triggered run)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Verifying tag ${GITHUB_REF} points to a commit on origin/main"
          git fetch origin main
          if ! git branch --contains ${GITHUB_SHA} --remote | grep -q origin/main; then
            echo "Tag ${GITHUB_REF} does not point to a commit on origin/main. Aborting publish."
            exit 1
          fi

      - name: Validate tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version (v$TAG_VERSION) does not match package.json version ($PACKAGE_VERSION). Aborting publish."
            exit 1
          fi
          echo "✓ Tag version matches package.json version: $PACKAGE_VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests and build
        run: |
          npm test --if-present
          npx tsc --noEmit
          npm run rollup --if-present

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
